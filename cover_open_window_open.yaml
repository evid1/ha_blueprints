blueprint:
  name: Rollo-Steuerung bei Fensteröffnung (Zeitbasiert) (v1)
  description: Öffnet ein Rollo auf eine bestimmte Höhe, wenn ein Fenster geöffnet wird, basierend auf verschiedenen Zeitfenstern.
  domain: automation
  input:
    window_sensor:
      name: Fenstersensor
      description: Der Sensor, der erkennt, ob das Fenster offen ist.
      selector:
        entity:
          domain: binary_sensor
          device_class: window
    shutter_entity:
      name: Rollo / Jalousie
      description: Das Rollo, das gesteuert werden soll.
      selector:
        entity:
          domain: cover
    
    # Zeitbereich 1
    time_start_1:
      name: Startzeit Bereich 1
      default: "07:00:00"
      selector:
        time: {}
    time_end_1:
      name: Endzeit Bereich 1
      default: "12:00:00"
      selector:
        time: {}
    position_1:
      name: Position Bereich 1 (%)
      default: 100
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"

    # Zeitbereich 2
    time_start_2:
      name: Startzeit Bereich 2
      default: "12:00:01"
      selector:
        time: {}
    time_end_2:
      name: Endzeit Bereich 2
      default: "20:00:00"
      selector:
        time: {}
    position_2:
      name: Position Bereich 2 (%)
      default: 50
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"

    # Standardposition (Nacht / Restliche Zeit)
    position_default:
      name: Standard-Position (außerhalb der Zeiten)
      description: Höhe, wenn das Fenster geöffnet wird und kein Zeitbereich zutrifft.
      default: 20
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"

mode: single

trigger:
  - platform: state
    entity_id: !input window_sensor
    from: "off"
    to: "on"

action:
  - choose:
      # Logik für Bereich 1
      - conditions:
          - condition: time
            after: !input time_start_1
            before: !input time_end_1
        sequence:
          - service: cover.set_cover_position
            target:
              entity_id: !input shutter_entity
            data:
              position: !input position_1
      
      # Logik für Bereich 2
      - conditions:
          - condition: time
            after: !input time_start_2
            before: !input time_end_2
        sequence:
          - service: cover.set_cover_position
            target:
              entity_id: !input shutter_entity
            data:
              position: !input position_2

    # Standardaktion, wenn nichts anderes zutrifft
    default:
      - service: cover.set_cover_position
        target:
          entity_id: !input shutter_entity
        data:
          position: !input position_default