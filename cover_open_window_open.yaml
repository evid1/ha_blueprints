blueprint:
  name: Rollo-Steuerung bei Fensteröffnung (v7)
  description: Erweitertes Blueprint mit optionalen Zeitbereichen.
  domain: automation
  input:
    window_sensor:
      name: Fenstersensor
      selector: {entity: {domain: binary_sensor, device_class: window}}
    cover_entity:
      name: Rollo / Jalousie
      selector: {entity: {domain: cover}}

    # Bereich 1 (Pflicht)
    time_start_1:
      name: Startzeit 1
      default: "07:00:00"
      selector: {time: {}}
    time_end_1:
      name: Endzeit 1
      default: "12:00:00"
      selector: {time: {}}
    position_1:
      name: Position 1 (%)
      default: 100
      selector: {number: {min: 0, max: 100, unit_of_measurement: "%"}}

    # Bereich 2 (Optional)
    enable_time_range_2:
      name: Bereich 2 aktivieren
      default: false
      selector: {boolean: {}}
    time_start_2:
      name: Startzeit 2
      default: "12:00:01"
      selector: {time: {}}
    time_end_2:
      name: Endzeit 2
      default: "20:00:00"
      selector: {time: {}}
    position_2:
      name: Position 2 (%)
      default: 50
      selector: {number: {min: 0, max: 100, unit_of_measurement: "%"}}

    # Bereich 3 (Optional)
    enable_time_range_3:
      name: Bereich 3 aktivieren
      default: false
      selector: {boolean: {}}
    time_start_3:
      name: Startzeit 3
      default: "20:00:01"
      selector: {time: {}}
    time_end_3:
      name: Endzeit 3
      default: "23:59:59"
      selector: {time: {}}
    position_3:
      name: Position 3 (%)
      default: 30
      selector: {number: {min: 0, max: 100, unit_of_measurement: "%"}}

    position_default:
      name: Standard-Position
      default: 20
      selector: {number: {min: 0, max: 100, unit_of_measurement: "%"}}

variables:
  enable_time_range_3: !input enable_time_range_3
  enable_time_range_2: !input enable_time_range_2
  cover_entity: !input cover_entity
  position_1: !input position_1
  position_2: !input position_2
  position_3: !input position_3

trigger:
  - platform: state
    entity_id: !input window_sensor
    from: "off"
    to: "on"

action:
  - choose:
      # Logik Bereich 3
      - conditions:
          - condition: template
            value_template: "{{ enable_time_range_3 == true }}"
          - condition: time
            after: !input time_start_3
            before: !input time_end_3
          - condition: template
            value_template: "{{ state_attr(cover_entity, 'current_position') != position_3 }}"
        sequence:
          - service: cover.set_cover_position
            target: {entity_id: !input cover_entity}
            data: {position: !input position_3}

      # Logik Bereich 2
      - conditions:
          - condition: template
            value_template: "{{ enable_time_range_2 == true }}"
          - condition: time
            after: !input time_start_2
            before: !input time_end_2
          - condition: template
            value_template: "{{ state_attr(cover_entity, 'current_position') != position_2 }}"
        sequence:
          - service: cover.set_cover_position
            target: {entity_id: !input cover_entity}
            data: {position: !input position_2}

      # Logik Bereich 1
      - conditions:
          - condition: time
            after: !input time_start_1
            before: !input time_end_1
          - condition: template
            value_template: "{{ state_attr(cover_entity, 'current_position') != position_1 }}"
        sequence:
          - service: cover.set_cover_position
            target: {entity_id: !input cover_entity}
            data: {position: !input position_1}

    default:
      - service: cover.set_cover_position
        target: {entity_id: !input cover_entity}
        data: {position: !input position_default}