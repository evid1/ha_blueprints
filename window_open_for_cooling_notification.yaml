blueprint:
  name: Sommer-Lüftungsempfehlung per Raum (v8)
  description: Sendet Benachrichtigungen zum Öffnen oder Schließen der Fenster, stoppt jedoch nach einer definierten Uhrzeit.
  domain: automation
  input:
    lueftung_sensor:
      name: Lüftungsempfehlung Sensor
      description: Der Binärsensor, der angibt, ob Lüften empfohlen ist (on = Lüften, off = Nicht lüften).
      selector:
        entity:
          filter:
            - domain: binary_sensor
    raum_name:
      name: Raumname
      description: Der Name des Raums (wird im Text der Benachrichtigung verwendet, z.B. "Wohnzimmer").
      selector:
        text:
    fenster_sensor:
      name: Fenstersensor
      description: Der Kontaktsensor des Fensters in diesem Raum.
      selector:
        entity:
          filter:
            - domain: binary_sensor
              device_class: door
            - domain: binary_sensor
              device_class: window
    fruehste_uhrzeit:
      name: Frühste Uhrzeit
      description: Vor dieser Uhrzeit werden keine Benachrichtigungen gesendet (z.B. 07:00:00).
      default: "07:00:00"
      selector:
        time: {}
    spaeteste_uhrzeit:
      name: Späteste Uhrzeit
      description: Nach dieser Uhrzeit werden keine Benachrichtigungen mehr gesendet (z.B. 22:00:00).
      default: "23:00:00"
      selector:
        time: {}

variables:
  raum_name: !input raum_name

trigger:
  - platform: state
    entity_id: !input lueftung_sensor
    to: "on"
    for:
      minutes: 10
    id: lueften_an
  - platform: state
    entity_id: !input lueftung_sensor
    to: "off"
    for:
      minutes: 10
    id: lueften_aus

# Die globale Bedingung sorgt dafür, dass die Automation nur vor der eingestellten Uhrzeit fortfährt
condition:
  - condition: time
    before: !input spaeteste_uhrzeit
    after: !input fruehste_uhrzeit

action:
  - choose:
      # Fall 1: Lüften wird empfohlen
      - conditions:
          - condition: trigger
            id: lueften_an
          # Nur benachrichtigen, wenn das Fenster aktuell noch ZU ist
          - condition: state
            entity_id: !input fenster_sensor
            state: "off"
        sequence:
          - action: notify.signal
            data:
              message: "Im Raum **{{ raum_name }}** kann das Fenster geöffnet werden!"
              data:
                text_mode: styled
              
      # Fall 2: Lüften nicht mehr empfohlen (Fenster sollte zu)
      - conditions:
          - condition: trigger
            id: lueften_aus
          # Nur benachrichtigen, wenn das Fenster auch tatsächlich OFFEN steht
          - condition: state
            entity_id: !input fenster_sensor
            state: "on"
        sequence:
          - action: notify.signal
            data:
              message: "Bitte das Fenster in **{{ raum_name }}** schließen."
              data:
                text_mode: styled

mode: parallel
max: 10